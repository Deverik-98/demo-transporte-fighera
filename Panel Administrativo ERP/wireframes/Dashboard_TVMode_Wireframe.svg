<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Dashboard TV Mode Wireframe</title>
  <desc id="desc">Wireframe low-fidelity monocromo del dashboard TV mode segmentado por zonas y ticker de alertas</desc>
  <rect x="0" y="0" width="1440" height="900" fill="#f5f5f5"/>
  <rect x="0" y="0" width="1440" height="80" fill="#d9d9d9" stroke="#9e9e9e"/>
  <text x="24" y="49" font-family="Arial, sans-serif" font-size="24" fill="#4a4a4a">TV Mode - Centro de Control</text>
  <text x="1140" y="49" font-family="Arial, sans-serif" font-size="16" fill="#666666">Rotacion auto: 10s</text>

  <rect x="24" y="96" width="688" height="610" fill="#efefef" stroke="#a6a6a6"/>
  <text x="44" y="126" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Zona Buenos Aires</text>
  <rect x="44" y="142" width="648" height="540" fill="#e2e2e2" stroke="#999999" stroke-dasharray="8,6"/>
  <text x="300" y="422" font-family="Arial, sans-serif" font-size="18" fill="#6f6f6f">Placeholder Mapa Segmentado</text>

  <rect x="728" y="96" width="688" height="610" fill="#efefef" stroke="#a6a6a6"/>
  <text x="748" y="126" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Zona Uruguay</text>
  <rect x="748" y="142" width="648" height="540" fill="#e2e2e2" stroke="#999999" stroke-dasharray="8,6"/>
  <text x="1008" y="422" font-family="Arial, sans-serif" font-size="18" fill="#6f6f6f">Placeholder Mapa Segmentado</text>

  <rect x="24" y="722" width="1392" height="154" fill="#e8e8e8" stroke="#9e9e9e"/>
  <text x="44" y="752" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Ticker de alertas operativas</text>
  <rect x="44" y="768" width="1360" height="34" fill="#dddddd" stroke="#9a9a9a"/>
  <text x="58" y="790" font-family="Arial, sans-serif" font-size="14" fill="#565656">[ALERTA] Demora critica en viaje VJ-021 | [ALERTA] Incidencia reportada por chofer | [ALERTA] Documento proximo a vencer</text>
  <rect x="44" y="812" width="1360" height="52" fill="#e1e1e1" stroke="#9a9a9a"/>
  <text x="58" y="842" font-family="Arial, sans-serif" font-size="14" fill="#565656">Resumen: viajes activos --- | alertas activas --- | alertas resueltas ---</text>
</svg>
