<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Modulo Costos Wireframe</title>
  <desc id="desc">Wireframe low-fidelity monocromo para costos y rentabilidad con KPI y graficos placeholder</desc>
  <rect x="0" y="0" width="1440" height="900" fill="#f5f5f5"/>
  <rect x="0" y="0" width="1440" height="72" fill="#d9d9d9" stroke="#9e9e9e"/>
  <text x="24" y="45" font-family="Arial, sans-serif" font-size="22" fill="#4a4a4a">Modulo Costos y Rentabilidad</text>

  <rect x="24" y="92" width="1392" height="88" fill="#ececec" stroke="#b0b0b0"/>
  <rect x="40" y="112" width="220" height="48" fill="#dfdfdf" stroke="#9e9e9e"/>
  <text x="56" y="142" font-family="Arial, sans-serif" font-size="13" fill="#606060">KPI: Costo total</text>
  <rect x="274" y="112" width="220" height="48" fill="#dfdfdf" stroke="#9e9e9e"/>
  <text x="290" y="142" font-family="Arial, sans-serif" font-size="13" fill="#606060">KPI: Margen</text>
  <rect x="508" y="112" width="220" height="48" fill="#dfdfdf" stroke="#9e9e9e"/>
  <text x="524" y="142" font-family="Arial, sans-serif" font-size="13" fill="#606060">KPI: Costo por km</text>
  <rect x="742" y="112" width="220" height="48" fill="#dfdfdf" stroke="#9e9e9e"/>
  <text x="758" y="142" font-family="Arial, sans-serif" font-size="13" fill="#606060">KPI: Variacion</text>

  <rect x="24" y="198" width="684" height="330" fill="#efefef" stroke="#a2a2a2"/>
  <text x="44" y="228" font-family="Arial, sans-serif" font-size="17" fill="#4a4a4a">Grafico tendencia de costos</text>
  <rect x="44" y="244" width="644" height="266" fill="#e1e1e1" stroke="#999999" stroke-dasharray="8,6"/>
  <text x="292" y="382" font-family="Arial, sans-serif" font-size="16" fill="#6c6c6c">Placeholder chart line/bar</text>

  <rect x="732" y="198" width="684" height="330" fill="#efefef" stroke="#a2a2a2"/>
  <text x="752" y="228" font-family="Arial, sans-serif" font-size="17" fill="#4a4a4a">Distribucion por categoria</text>
  <rect x="752" y="244" width="644" height="266" fill="#e1e1e1" stroke="#999999" stroke-dasharray="8,6"/>
  <text x="1012" y="382" font-family="Arial, sans-serif" font-size="16" fill="#6c6c6c">Placeholder pie chart</text>

  <rect x="24" y="546" width="1392" height="330" fill="#efefef" stroke="#a2a2a2"/>
  <text x="44" y="576" font-family="Arial, sans-serif" font-size="17" fill="#4a4a4a">Detalle por viaje / centro de costo</text>
  <rect x="44" y="592" width="1360" height="264" fill="#e2e2e2" stroke="#9a9a9a" stroke-dasharray="8,6"/>
  <text x="596" y="728" font-family="Arial, sans-serif" font-size="16" fill="#6c6c6c">Placeholder tabla costos detallados</text>
</svg>
