<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Wireframe Monitor de Operaciones</title>
  <desc id="desc">Wireframe low-fidelity monocromo del modulo Monitor de Operaciones</desc>

  <rect x="0" y="0" width="1440" height="900" fill="#f5f5f5"/>

  <!-- Header superior -->
  <rect x="0" y="0" width="1440" height="72" fill="#d9d9d9" stroke="#9e9e9e"/>
  <text x="24" y="44" font-family="Arial, sans-serif" font-size="22" fill="#4a4a4a">Panel Administrativo ERP</text>
  <text x="1040" y="44" font-family="Arial, sans-serif" font-size="16" fill="#616161">Usuario | Notificaciones</text>

  <!-- Sidebar izquierda -->
  <rect x="0" y="72" width="240" height="828" fill="#e6e6e6" stroke="#b3b3b3"/>
  <text x="24" y="110" font-family="Arial, sans-serif" font-size="16" fill="#4a4a4a">Menu</text>
  <rect x="20" y="130" width="200" height="34" fill="#d0d0d0" stroke="#9e9e9e"/>
  <text x="34" y="152" font-family="Arial, sans-serif" font-size="14" fill="#4a4a4a">Dashboard</text>
  <rect x="20" y="172" width="200" height="34" fill="#c2c2c2" stroke="#8a8a8a"/>
  <text x="34" y="194" font-family="Arial, sans-serif" font-size="14" fill="#3a3a3a">Monitor de Operaciones</text>
  <rect x="20" y="214" width="200" height="34" fill="#d0d0d0" stroke="#9e9e9e"/>
  <text x="34" y="236" font-family="Arial, sans-serif" font-size="14" fill="#4a4a4a">Viajes</text>
  <rect x="20" y="256" width="200" height="34" fill="#d0d0d0" stroke="#9e9e9e"/>
  <text x="34" y="278" font-family="Arial, sans-serif" font-size="14" fill="#4a4a4a">Choferes</text>

  <!-- Contenido principal -->
  <text x="272" y="118" font-family="Arial, sans-serif" font-size="30" fill="#3f3f3f">Monitor de Operaciones</text>

  <!-- Barra de filtros -->
  <rect x="272" y="142" width="1136" height="68" fill="#ededed" stroke="#bdbdbd"/>
  <rect x="292" y="160" width="220" height="34" fill="#ffffff" stroke="#9e9e9e"/>
  <text x="304" y="182" font-family="Arial, sans-serif" font-size="13" fill="#6a6a6a">Filtro: Zona</text>
  <rect x="526" y="160" width="220" height="34" fill="#ffffff" stroke="#9e9e9e"/>
  <text x="538" y="182" font-family="Arial, sans-serif" font-size="13" fill="#6a6a6a">Filtro: Estado</text>
  <rect x="760" y="160" width="220" height="34" fill="#ffffff" stroke="#9e9e9e"/>
  <text x="772" y="182" font-family="Arial, sans-serif" font-size="13" fill="#6a6a6a">Filtro: Fecha</text>
  <rect x="1200" y="156" width="188" height="40" fill="#cfcfcf" stroke="#8f8f8f"/>
  <text x="1238" y="181" font-family="Arial, sans-serif" font-size="15" fill="#3f3f3f">Asignar viaje</text>

  <!-- Cards de zonas -->
  <rect x="272" y="230" width="558" height="294" fill="#f0f0f0" stroke="#9d9d9d"/>
  <text x="292" y="258" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Zona Norte</text>
  <rect x="292" y="272" width="518" height="234" fill="#e2e2e2" stroke="#a5a5a5" stroke-dasharray="8,6"/>
  <text x="470" y="395" font-family="Arial, sans-serif" font-size="16" fill="#6f6f6f">Placeholder Mapa</text>

  <rect x="850" y="230" width="558" height="294" fill="#f0f0f0" stroke="#9d9d9d"/>
  <text x="870" y="258" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Zona Sur</text>
  <rect x="870" y="272" width="518" height="234" fill="#e2e2e2" stroke="#a5a5a5" stroke-dasharray="8,6"/>
  <text x="1048" y="395" font-family="Arial, sans-serif" font-size="16" fill="#6f6f6f">Placeholder Mapa</text>

  <!-- Lista de viajes debajo -->
  <rect x="272" y="544" width="1136" height="200" fill="#f3f3f3" stroke="#adadad"/>
  <text x="292" y="572" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Lista de viajes</text>
  <rect x="292" y="588" width="1096" height="40" fill="#e5e5e5" stroke="#a2a2a2"/>
  <text x="308" y="613" font-family="Arial, sans-serif" font-size="14" fill="#555555">Viaje #001 | Zona Norte | En curso | Chofer: ---</text>
  <rect x="292" y="634" width="1096" height="40" fill="#e5e5e5" stroke="#a2a2a2"/>
  <text x="308" y="659" font-family="Arial, sans-serif" font-size="14" fill="#555555">Viaje #002 | Zona Sur | Pendiente | Chofer: ---</text>
  <rect x="292" y="680" width="1096" height="40" fill="#e5e5e5" stroke="#a2a2a2"/>
  <text x="308" y="705" font-family="Arial, sans-serif" font-size="14" fill="#555555">Viaje #003 | Zona Norte | Retrasado | Chofer: ---</text>

  <!-- Panel de alertas al final -->
  <rect x="272" y="762" width="1136" height="118" fill="#e9e9e9" stroke="#9e9e9e"/>
  <text x="292" y="790" font-family="Arial, sans-serif" font-size="18" fill="#4a4a4a">Panel de alertas</text>
  <text x="292" y="815" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">- Alerta: Viaje #003 con retraso mayor a 20 min.</text>
  <text x="292" y="838" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">- Alerta: Zona Sur con alta demanda operativa.</text>
  <text x="292" y="861" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">- Alerta: 2 choferes pendientes de asignacion.</text>
</svg>
